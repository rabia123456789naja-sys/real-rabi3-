<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RABI3 AI PRO | الذكاء الخارق</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="config.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1a, #03060c);
            font-family: 'Cairo', monospace;
            color: #eef5ff;
            padding: 15px;
            min-height: 100vh;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* الهيدر */
        .header {
            text-align: center;
            padding: 15px;
            background: rgba(0,20,40,0.6);
            backdrop-filter: blur(12px);
            border-radius: 50px;
            margin-bottom: 20px;
            border: 1px solid cyan;
        }
        .glow-text { font-size: 1.5rem; font-weight: 900; background: linear-gradient(135deg, #fff, #0ff, #f0f); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .sub-text { color: #88aaff; font-size: 0.7rem; }
        .social-links { display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
        .social-links a { color: #0ff; font-size: 1.3rem; background: rgba(0,0,0,0.5); width: 40px; height: 40px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; border: 1px solid cyan; transition: 0.3s; }
        .social-links a:hover { transform: translateY(-3px); color: magenta; border-color: magenta; }
        
        /* بطاقات */
        .card {
            background: rgba(10,20,40,0.7);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid cyan;
        }
        .card h3 { text-align: center; margin-bottom: 12px; font-size: 1.2rem; }
        
        .ip-group { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .ip-group input { flex: 2; min-width: 200px; background: #0a1a2a; border: 1px solid cyan; border-radius: 50px; padding: 10px 15px; color: white; outline: none; }
        .ip-group button { background: linear-gradient(90deg, cyan, #0a6eff); border: none; border-radius: 50px; padding: 10px 25px; font-weight: bold; cursor: pointer; }
        .ip-group button:hover { background: linear-gradient(90deg, magenta, #ff00aa); color: white; }
        
        .result-card { background: #0a1222; border-radius: 20px; padding: 15px; margin-top: 15px; border-left: 3px solid cyan; display: none; }
        .result-card.visible { display: block; }
        .info-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 10px; }
        .info-item { background: rgba(0,0,0,0.4); border-radius: 15px; padding: 8px; border-left: 2px solid cyan; }
        .info-label { font-size: 0.6rem; color: #99ccff; }
        .info-value { font-size: 0.85rem; font-weight: bold; }
        .map-container { height: 250px; border-radius: 20px; overflow: hidden; border: 2px solid red; margin-top: 15px; }
        
        .translate-box { display: flex; gap: 10px; flex-wrap: wrap; }
        .translate-box textarea { flex: 1; background: #0a1a2a; border: 1px solid cyan; border-radius: 20px; padding: 10px; color: white; resize: none; }
        .translate-buttons { display: flex; gap: 10px; justify-content: center; margin: 10px 0; }
        .translate-buttons button { background: linear-gradient(90deg, cyan, #0a6eff); border: none; border-radius: 50px; padding: 6px 15px; font-weight: bold; cursor: pointer; }
        .translate-result { background: #0a1222; border-radius: 20px; padding: 10px; border-left: 3px solid cyan; margin-top: 10px; font-size: 0.85rem; }
        
        /* زر الذكاء الاصطناعي */
        .ai-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 65px;
            height: 65px;
            background: linear-gradient(145deg, #1a0033, #0a001a);
            border-radius: 50%;
            border: 2px solid magenta;
            box-shadow: 0 0 20px magenta;
            cursor: pointer;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: white;
            transition: 0.3s;
        }
        .ai-btn:hover { transform: scale(1.1); border-color: cyan; box-shadow: 0 0 30px cyan; }
        
        .ai-window {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 350px;
            height: 480px;
            background: #0a0a1a;
            backdrop-filter: blur(20px);
            border-radius: 25px;
            border: 2px solid magenta;
            z-index: 9998;
            display: none;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(255,0,255,0.3);
        }
        .ai-header {
            background: #1a0033;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid magenta;
            cursor: move;
            user-select: none;
        }
        .ai-messages {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 0.85rem;
        }
        .ai-msg { background: #1a1a2a; padding: 8px 12px; border-radius: 15px; max-width: 85%; width: fit-content; border-left: 2px solid cyan; }
        .user-msg { background: #2a1a4a; align-self: flex-end; border-right: 2px solid magenta; border-left: none; text-align: right; }
        .typing { background: #1a1a2a; padding: 8px 12px; border-radius: 15px; width: fit-content; color: #aaa; font-style: italic; }
        .ai-input { display: flex; border-top: 1px solid magenta; padding: 10px; gap: 8px; }
        .ai-input input { flex: 1; background: #0a1a2a; border: 1px solid cyan; border-radius: 50px; padding: 8px 12px; color: white; outline: none; }
        .ai-input button { background: magenta; border: none; border-radius: 50px; padding: 8px 15px; color: white; cursor: pointer; }
        
        footer { text-align: center; margin-top: 20px; padding: 10px; color: #6c8f8c; font-size: 0.65rem; }
        .warning { background: rgba(50,0,0,0.6); border-left: 3px solid #ff5555; padding: 6px; border-radius: 15px; margin-top: 10px; font-size: 0.6rem; }
        
        @media (max-width: 700px) {
            .ai-window { width: 90%; right: 5%; bottom: 90px; height: 450px; }
            .glow-text { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="glow-text">⚡ RABI3 AI PRO ⚡</div>
        <div class="sub-text">تتبع IP + مترجم + ذكاء اصطناعي خارق</div>
        <div class="social-links">
            <a href="https://www.facebook.com/HACR97" target="_blank"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.instagram.com/real_rabi31" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://t.me/rabi3_prof12" target="_blank"><i class="fab fa-telegram-plane"></i></a>
        </div>
    </div>

    <!-- تتبع IP -->
    <div class="card">
        <h3><i class="fas fa-map-marker-alt"></i> تتبع IP</h3>
        <div class="ip-group">
            <input type="text" id="targetIp" placeholder="أدخل IP (مثال: 8.8.8.8)" value="8.8.8.8">
            <button id="scanBtn">🔍 تتبع</button>
        </div>
        <div id="ipResult" class="result-card">
            <div id="ipInfoGrid" class="info-grid"></div>
            <div id="mapContainer" class="map-container"></div>
        </div>
        <div class="warning">للأغراض التعليمية فقط</div>
    </div>

    <!-- مترجم -->
    <div class="card">
        <h3><i class="fas fa-language"></i> مترجم فوري</h3>
        <div class="translate-box">
            <textarea id="sourceText" rows="2" placeholder="اكتب النص هنا..."></textarea>
        </div>
        <div class="translate-buttons">
            <button id="toArabicBtn">🔄 ترجمة إلى العربية</button>
            <button id="toEnglishBtn">🔄 ترجمة إلى الإنجليزية</button>
        </div>
        <div id="translateResult" class="translate-result">ستظهر الترجمة هنا...</div>
    </div>
    
    <footer>© RABI3 PROF12 | يعمل بتقنية OpenRouter AI</footer>
</div>

<div class="ai-btn" id="aiBtn"><i class="fas fa-brain"></i></div>

<div class="ai-window" id="aiWindow">
    <div class="ai-header">
        <span><i class="fas fa-robot"></i> RABI3 AI</span>
        <span id="closeAi" style="cursor:pointer; font-size:1.5rem;">&times;</span>
    </div>
    <div class="ai-messages" id="aiMessages">
        <div class="ai-msg">🤖 مرحباً! أنا RABI3 AI، اسألني أي شيء.</div>
    </div>
    <div class="ai-input">
        <input type="text" id="aiInput" placeholder="اكتب سؤالك هنا...">
        <button id="sendAi">إرسال</button>
    </div>
</div>

<script>
    // =====================================================
    // المفتاح من config.js
    // =====================================================
    const API_KEY = typeof OPENROUTER_API_KEY !== 'undefined' ? OPENROUTER_API_KEY : null;
    const API_URL = "https://openrouter.ai/api/v1/chat/completions";
    
    if (!API_KEY) {
        console.warn("⚠️ config.js غير موجود");
        alert("⚠️ ملف config.js غير موجود! تأكد من وجوده في نفس المجلد.");
    }
    
    // =====================================================
    // تتبع IP
    // =====================================================
    async function fetchIP(ip) {
        const url = `https://ip-api.com/json/${ip}?fields=66846719`;
        const res = await fetch(url);
        const data = await res.json();
        if (data.status === 'fail') throw new Error('IP غير صالح');
        return data;
    }
    
    let map = null;
    function showMap(lat, lon, city) {
        const container = document.getElementById('mapContainer');
        if (map) map.remove();
        container.innerHTML = '';
        map = L.map(container).setView([lat, lon], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '© OSM' }).addTo(map);
        L.circle([lat, lon], { color: '#ff0000', fillColor: '#ff0000', fillOpacity: 0.15, radius: 1200 }).addTo(map);
        L.marker([lat, lon]).addTo(map).bindPopup(`<b style="color:red;">${city}</b>`).openPopup();
    }
    
    function displayIP(data) {
        const container = document.getElementById('ipInfoGrid');
        container.innerHTML = '';
        const fields = [
            { label: '🌐 IP', value: data.query },
            { label: '🌍 الدولة', value: data.country },
            { label: '🏙️ المدينة', value: data.city },
            { label: '📍 الإحداثيات', value: `${data.lat}, ${data.lon}` },
            { label: '📡 المزود', value: data.isp || 'غير معروف' }
        ];
        fields.forEach(f => {
            const div = document.createElement('div');
            div.className = 'info-item';
            div.innerHTML = `<div class="info-label">${f.label}</div><div class="info-value">${f.value}</div>`;
            container.appendChild(div);
        });
        document.getElementById('ipResult').classList.add('visible');
        showMap(data.lat, data.lon, data.city);
    }
    
    document.getElementById('scanBtn').onclick = async () => {
        const ip = document.getElementById('targetIp').value.trim();
        if (!ip) { alert('أدخل IP'); return; }
        const btn = document.getElementById('scanBtn');
        btn.innerHTML = '⏳ جاري...';
        btn.disabled = true;
        try {
            const data = await fetchIP(ip);
            displayIP(data);
        } catch(e) { alert(e.message); }
        finally { btn.innerHTML = '🔍 تتبع'; btn.disabled = false; }
    };
    
    // =====================================================
    // الترجمة
    // =====================================================
    async function toArabic(text) {
        if (!text.trim()) return "أدخل نصاً";
        try {
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|ar`);
            const data = await res.json();
            return data.responseData.translatedText || "خطأ";
        } catch(e) { return "فشل الاتصال"; }
    }
    
    async function toEnglish(text) {
        if (!text.trim()) return "Enter text";
        try {
            const res = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=ar|en`);
            const data = await res.json();
            return data.responseData.translatedText || "Error";
        } catch(e) { return "Connection failed"; }
    }
    
    document.getElementById('toArabicBtn').onclick = async () => {
        const txt = document.getElementById('sourceText').value;
        const div = document.getElementById('translateResult');
        div.innerHTML = '⏳ جاري...';
        const result = await toArabic(txt);
        div.innerHTML = `🇸🇦 ${result}`;
    };
    
    document.getElementById('toEnglishBtn').onclick = async () => {
        const txt = document.getElementById('sourceText').value;
        const div = document.getElementById('translateResult');
        div.innerHTML = '⏳ Translating...';
        const result = await toEnglish(txt);
        div.innerHTML = `🇬🇧 ${result}`;
    };
    
    // =====================================================
    // الذكاء الاصطناعي
    // =====================================================
    const aiBtn = document.getElementById('aiBtn');
    const aiWindow = document.getElementById('aiWindow');
    const closeAi = document.getElementById('closeAi');
    const aiMessages = document.getElementById('aiMessages');
    const aiInput = document.getElementById('aiInput');
    const sendAi = document.getElementById('sendAi');
    
    let isWaiting = false;
    let isDragging = false, dragX = 0, dragY = 0;
    const aiHeader = document.querySelector('.ai-header');
    
    aiHeader.addEventListener('mousedown', (e) => {
        isDragging = true;
        dragX = e.clientX - aiWindow.offsetLeft;
        dragY = e.clientY - aiWindow.offsetTop;
        aiWindow.style.transition = 'none';
    });
    document.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        let left = e.clientX - dragX;
        let top = e.clientY - dragY;
        left = Math.min(Math.max(0, left), window.innerWidth - aiWindow.offsetWidth);
        top = Math.min(Math.max(0, top), window.innerHeight - aiWindow.offsetHeight);
        aiWindow.style.left = left + 'px';
        aiWindow.style.right = 'auto';
        aiWindow.style.top = top + 'px';
        aiWindow.style.bottom = 'auto';
    });
    document.addEventListener('mouseup', () => { isDragging = false; aiWindow.style.transition = ''; });
    
    aiBtn.onclick = () => { aiWindow.style.display = 'flex'; };
    closeAi.onclick = () => { aiWindow.style.display = 'none'; };
    
    function addMsg(text, isUser = false) {
        const div = document.createElement('div');
        div.className = isUser ? 'user-msg ai-msg' : 'ai-msg';
        div.innerHTML = isUser ? `👤 ${text}` : `🤖 ${text}`;
        aiMessages.appendChild(div);
        aiMessages.scrollTop = aiMessages.scrollHeight;
    }
    
    function showTyping() {
        const div = document.createElement('div');
        div.className = 'typing';
        div.id = 'typingMsg';
        div.innerHTML = '🤖 جاري التفكير...';
        aiMessages.appendChild(div);
        aiMessages.scrollTop = aiMessages.scrollHeight;
    }
    function hideTyping() {
        const t = document.getElementById('typingMsg');
        if (t) t.remove();
    }
    
    async function callAI(msg) {
        if (!API_KEY) return "⚠️ مفتاح API غير موجود. تأكد من وجود config.js";
        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${API_KEY}`,
                    'HTTP-Referer': window.location.href
                },
                body: JSON.stringify({
                    model: "mistralai/mistral-7b-instruct:free",
                    messages: [{ role: "user", content: msg }],
                    temperature: 0.7,
                    max_tokens: 300
                })
            });
            const data = await res.json();
            if (data.error) return `❌ خطأ: ${data.error.message}`;
            return data.choices[0].message.content;
        } catch(e) {
            return "❌ خطأ في الاتصال بالخادم";
        }
    }
    
    async function sendMsg() {
        const msg = aiInput.value.trim();
        if (!msg || isWaiting) return;
        addMsg(msg, true);
        aiInput.value = '';
        isWaiting = true;
        showTyping();
        const reply = await callAI(msg);
        hideTyping();
        addMsg(reply, false);
        isWaiting = false;
    }
    
    sendAi.onclick = sendMsg;
    aiInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMsg(); });
    
    console.log("%c✅ RABI3 AI PRO - جاهز!", "color: cyan; font-size: 14px");
    if (API_KEY) console.log("%c🔑 المفتاح موجود في config.js", "color: lime");
    else console.log("%c❌ config.js غير موجود", "color: red");
</script>
</body>
</html>
